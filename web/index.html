<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <title>Loudmouth Spin Lab</title>
    <meta name="description" content="Dr. Loudmouth's casino spin lab game." />

    <!-- Facebook Instant Games SDK — MUST be loaded before any game code -->
    <script src="https://connect.facebook.net/en_US/fbinstant.7.1.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        background-color: #1a0533;
        overflow: hidden;
      }
      /* Loading overlay shown until FBInstant.startGameAsync() resolves */
      #fb-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a0533;
        z-index: 9999;
        color: #ffd700;
        font-family: sans-serif;
        gap: 16px;
      }
      #fb-loading h1 {
        font-size: 2rem;
      }
      #fb-loading p {
        color: #94a3b8;
        font-size: 0.9rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid #2d0a5e;
        border-top-color: #ffd700;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- FB Instant Games loading overlay (hidden once SDK is ready) -->
    <div id="fb-loading">
      <div class="spinner"></div>
      <h1>🎰 Spin Lab</h1>
      <p>Loading…</p>
    </div>

    <!-- React / Expo web app root -->
    <div id="root"></div>

    <!--
      The FB Instant Games SDK must be initialised BEFORE mounting React.
      App.js calls initFBInstant() which resolves FBInstant.initializeAsync()
      and FBInstant.startGameAsync() and then hides this overlay.

      On non-FB contexts (standalone web), the overlay is hidden immediately
      because window.FBInstant will be undefined and App.js skips the SDK calls.
    -->
    <script>
      /*
       * The React app (App.js → initFBInstant) is solely responsible for calling
       * FBInstant.initializeAsync() and FBInstant.startGameAsync().
       * Once those resolve it hides this overlay via hideFBLoadingOverlay().
       *
       * On standalone web (no FBInstant) the overlay is hidden immediately so the
       * app renders without a loading screen.
       */
      window.hideFBLoadingOverlay = function () {
        var el = document.getElementById('fb-loading');
        if (el) el.style.display = 'none';
      };

      if (typeof FBInstant === 'undefined') {
        window.hideFBLoadingOverlay();
      }
    </script>
  </body>
</html>
